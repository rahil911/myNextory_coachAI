# Notification Routing Configuration
#
# Routes agent/bead events to Telegram and Slack.
# Sends directly to APIs (no gateway dependency).

notifications:
  enabled: true
  dashboard_url: "https://rahil911.duckdns.org:8002"

  credentials:
    telegram_bot_token: "8595926634:AAHWQ-ee7JYrR4WOgBfUKZRPEYpvyLab6M0"
    telegram_chat_id: "8288652266"
    # slack_webhook_url: "https://hooks.slack.com/services/T.../B.../xxx"  # Add when ready

  routes:
    # Critical alerts — high-priority events
    - name: critical-alerts
      priority: [3]
      channels:
        - "telegram:8288652266"

    # Agent lifecycle — spawn, complete, fail events
    - name: agent-status
      event_types:
        - agent_spawned
        - agent_complete
        - agent_fail
        - agent_gone
      channels:
        - "telegram:8288652266"

    # Bead transitions — when beads move between states
    - name: bead-transitions
      event_types:
        - bead_blocked
        - bead_closed
      channels:
        - "telegram:8288652266"

    # Test notifications
    - name: test
      event_types:
        - test
      channels:
        - "telegram:8288652266"
